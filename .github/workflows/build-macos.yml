name: build-macos
on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos12:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: make && sudo make package
      - uses: actions/upload-artifact@v4
        with:
          name: macos12
          path: 'macosx/pivy-*.pkg'
